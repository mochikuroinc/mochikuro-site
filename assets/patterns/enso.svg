<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 円相（禅の円） - 掠れた筆跡 -->
  <defs>
    <filter id="ensoRough">
      <feTurbulence baseFrequency="0.7" numOctaves="2" seed="3"/>
      <feDisplacementMap in="SourceGraphic" scale="3"/>
    </filter>
  </defs>
  <g>
    <circle cx="100" cy="100" r="75" fill="none" stroke="#1a1a1a" stroke-width="9" stroke-dasharray="460 30" stroke-linecap="round" transform="rotate(-35 100 100)" filter="url(#ensoRough)"/>
  </g>
</svg>
