<svg viewBox="0 0 16 16" shape-rendering="crispEdges" xmlns="http://www.w3.org/2000/svg">
  <!-- ピクセル黒猫 -->
  <!-- ears -->
  <rect x="3" y="1" width="2" height="3" fill="#1a1a1a"/>
  <rect x="11" y="1" width="2" height="3" fill="#1a1a1a"/>
  <!-- head -->
  <rect x="1" y="3" width="14" height="7" fill="#1a1a1a"/>
  <!-- eyes (gold) -->
  <rect x="4" y="5" width="2" height="2" fill="#d4af37"/>
  <rect x="10" y="5" width="2" height="2" fill="#d4af37"/>
  <rect x="5" y="5" width="1" height="2" fill="#1a1a1a"/>
  <rect x="11" y="5" width="1" height="2" fill="#1a1a1a"/>
  <!-- nose -->
  <rect x="7" y="7" width="2" height="1" fill="#d4af37"/>
  <!-- body -->
  <rect x="2" y="10" width="12" height="4" fill="#1a1a1a"/>
  <!-- legs -->
  <rect x="3" y="14" width="3" height="2" fill="#1a1a1a"/>
  <rect x="10" y="14" width="3" height="2" fill="#1a1a1a"/>
  <!-- tail (raised high) -->
  <rect x="14" y="6" width="1" height="4" fill="#1a1a1a"/>
  <rect x="15" y="2" width="1" height="5" fill="#1a1a1a"/>
</svg>
