<svg viewBox="0 0 16 16" shape-rendering="crispEdges" xmlns="http://www.w3.org/2000/svg">
  <!-- ピクセル白猫 -->
  <!-- ears -->
  <rect x="3" y="1" width="2" height="3" fill="#1a1a1a"/>
  <rect x="11" y="1" width="2" height="3" fill="#1a1a1a"/>
  <rect x="3" y="2" width="1" height="1" fill="#f5f0e8"/>
  <rect x="12" y="2" width="1" height="1" fill="#f5f0e8"/>
  <!-- head -->
  <rect x="2" y="3" width="12" height="1" fill="#1a1a1a"/>
  <rect x="1" y="4" width="14" height="5" fill="#f5f0e8"/>
  <rect x="1" y="4" width="1" height="5" fill="#1a1a1a"/>
  <rect x="14" y="4" width="1" height="5" fill="#1a1a1a"/>
  <rect x="2" y="9" width="12" height="1" fill="#1a1a1a"/>
  <!-- eyes -->
  <rect x="4" y="5" width="2" height="2" fill="#1a1a1a"/>
  <rect x="10" y="5" width="2" height="2" fill="#1a1a1a"/>
  <!-- nose -->
  <rect x="7" y="7" width="2" height="1" fill="#c2603b"/>
  <!-- body -->
  <rect x="3" y="10" width="10" height="1" fill="#1a1a1a"/>
  <rect x="2" y="11" width="12" height="3" fill="#f5f0e8"/>
  <rect x="2" y="11" width="1" height="3" fill="#1a1a1a"/>
  <rect x="13" y="11" width="1" height="3" fill="#1a1a1a"/>
  <!-- legs -->
  <rect x="3" y="14" width="3" height="2" fill="#1a1a1a"/>
  <rect x="10" y="14" width="3" height="2" fill="#1a1a1a"/>
  <rect x="4" y="14" width="1" height="1" fill="#f5f0e8"/>
  <rect x="11" y="14" width="1" height="1" fill="#f5f0e8"/>
  <!-- tail -->
  <rect x="14" y="7" width="1" height="4" fill="#1a1a1a"/>
  <rect x="15" y="4" width="1" height="4" fill="#1a1a1a"/>
</svg>
