<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220">
  <!-- 白猫（モダンフラット・イラスト） -->
  <g>
    <!-- Tail -->
    <path d="M 150 162 C 182 156, 188 115, 182 80 C 178 62, 162 62, 160 78 C 163 100, 162 132, 154 156 Z" fill="#f8f3e9" stroke="#1a1a1a" stroke-width="2" stroke-linejoin="round"/>
    <!-- Body -->
    <path d="M 55 130 Q 55 205, 100 205 Q 145 205, 145 130 Q 145 100, 100 100 Q 55 100, 55 130 Z" fill="#f8f3e9" stroke="#1a1a1a" stroke-width="2" stroke-linejoin="round"/>
    <!-- Paws -->
    <ellipse cx="80" cy="203" rx="13" ry="8" fill="#f8f3e9" stroke="#1a1a1a" stroke-width="2"/>
    <ellipse cx="120" cy="203" rx="13" ry="8" fill="#f8f3e9" stroke="#1a1a1a" stroke-width="2"/>
    <!-- Head -->
    <circle cx="100" cy="75" r="46" fill="#f8f3e9" stroke="#1a1a1a" stroke-width="2"/>
    <!-- Ears -->
    <path d="M 58 45 L 55 6 L 90 40 Z" fill="#f8f3e9" stroke="#1a1a1a" stroke-width="2" stroke-linejoin="round"/>
    <path d="M 142 45 L 145 6 L 110 40 Z" fill="#f8f3e9" stroke="#1a1a1a" stroke-width="2" stroke-linejoin="round"/>
    <!-- Inner ears -->
    <path d="M 63 42 L 61 20 L 82 40 Z" fill="#f5c2d4"/>
    <path d="M 137 42 L 139 20 L 118 40 Z" fill="#f5c2d4"/>
    <!-- Eyes -->
    <ellipse cx="82" cy="72" rx="5.5" ry="8" fill="#1a1a1a"/>
    <ellipse cx="118" cy="72" rx="5.5" ry="8" fill="#1a1a1a"/>
    <circle cx="84" cy="68" r="2" fill="#ffffff"/>
    <circle cx="120" cy="68" r="2" fill="#ffffff"/>
    <!-- Nose -->
    <path d="M 95 87 L 105 87 L 100 94 Z" fill="#f5a5bf" stroke="#1a1a1a" stroke-width="1"/>
    <!-- Mouth -->
    <path d="M 100 94 Q 92 101 86 97 M 100 94 Q 108 101 114 97" stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Whiskers -->
    <g stroke="#1a1a1a" stroke-width="1.3" stroke-linecap="round" opacity="0.6">
      <line x1="54" y1="85" x2="78" y2="86"/>
      <line x1="54" y1="93" x2="78" y2="92"/>
      <line x1="122" y1="86" x2="146" y2="85"/>
      <line x1="122" y1="92" x2="146" y2="93"/>
    </g>
  </g>
</svg>
